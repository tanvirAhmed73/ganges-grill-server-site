# Service root must be the folder that contains package.json (repo root), NOT "src".
# Dashboard: Settings → Root Directory → leave empty. If you see /opt/render/project/src/ in logs, fix this.

services:
  - type: web
    name: ganges-grill-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
